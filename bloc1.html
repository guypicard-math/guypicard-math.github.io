<div id="rationaliser" class="concept-content" style="display:none;">
                <h2>Exercice 1 : Éliminer la racine au dénominateur</h2>
                <p>Rationalise le dénominateur de l'expression suivante et simplifie au maximum :</p>
                
                <div class="fraction-container">
                    <span class="numerateur">6</span>
                    <span class="denominateur">&radic;3</span>
                </div>
                
                <div class="zone-exercice">
                    <p>Format de la réponse : <em>a</em>&radic;<em>b</em></p>
                    <label>a = </label>
                    <input type="number" id="rationaliser-a" placeholder="Ex: 2" class="input-math">
                    
                    <label> &radic;b où b = </label>
                    <input type="number" id="rationaliser-b" placeholder="Ex: 3" class="input-math">
                    
                    <div class="boutons-actions">
                        <button onclick="verifierRationalisation()" class="btn-valider">Vérifier</button>
                        <button onclick="afficherIndiceRationaliser()" class="btn-indice">Besoin d'un indice ?</button>
                    </div>
                    
                    <p id="rationaliser-indice" class="texte-indice" style="display:none;"></p>
                    <p id="rationaliser-retroaction" class="texte-retroaction"></p>
                </div>
            </div>
